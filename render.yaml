services:
  - type: web
    name: telangana-estates
    env: node
    plan: free
    buildCommand: bash build.sh
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: MONGO_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
